# Builds the frontend and deploys it to GitHub Pages on every push.
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".
#
# The Pages site talks to the backend running on YOUR machine
# (`npm run server`, http://localhost:8787). To point it elsewhere, set a
# repository variable named API_BASE (Settings → Secrets and variables →
# Actions → Variables).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/quirky-hamilton-crnk9j]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
        env:
          VITE_API_BASE: ${{ vars.API_BASE || 'http://localhost:8787' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
